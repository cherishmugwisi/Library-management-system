<!DOCTYPE html>
<html>
    <head>
    
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>{% block title %} Library Management System{% endblock %}</title>
        <style>
            body {
                font-family:sans-serif;
                margin:0;
                padding:20px;
            }
            .header {
                background:#2c3e50;
                color:white;
                padding:1rem;
            }
            .nav{
                background:#34495e;
                padding:0.5rem;
            }
            .nav a{
                color:white;
                margin-right:1rem;
                text-decoration:none;
            }
            .content {
                margin:2rem 0;
            }
            
        </style>
        
        <body>
            <div class="header">
                <h1>Library Management System</h1>
            </div>
            <div class="nav">
                <a href="{% url 'index' %}">Home</a>
                <a href="{% url 'book_list' %}"> All Books</a>
            </div>
            <div class="content">
                {% block content %}
                {% endblock %}

            </div>
        </body>
    </head>
</html>
