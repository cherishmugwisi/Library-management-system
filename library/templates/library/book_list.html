{% extends 'library/base.html' %}
{% block content %}
<h2>All Books</h2>
<div class="book_list">
    {% for book in books %}
    <h3><a href="#">{{book.title}}</a></h3>
    {% if book.available %}Available
    {% else %} Checked out
    {% endif %}
    {% empty %}
    <p>No books available</p>
    {% endfor %}
</div>
<a href="{% url'book_detail' book.id %}">Book to All Books</a>
{% endblock %}
